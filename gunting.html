<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gunting batu kertas</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header><h1>GUNTING,BATU,KERTAS</h1></header>

    <div class="score-board">
        <div id="user-label" class="badge">user</div>
        <div id="computer-label" class="badge">comp</div>
        <span id="user-score">0:</span><span id="computer-score">0</span>
    </div>

    <div class="result">
        <p>kertas mengalahkan batu. kamu menang!</p>
    </div>

    <div class="choices">
        <div class="choice" id="w">
            <img src="watu.jpg" alt="" height="90px">
        </div>
        <div class="choice" id="g">
            <img src="gunting.jpg" alt="" height="90px">
        </div>
        <div class="choice" id="p">
            <img src="paper.png" alt="" height="90px">
        </div>
    </div>

    <p id="action-message">Giliranmu!</p>

</body>
</html>
